<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QMC Decoder</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.container{background:#fff;border-radius:18px;padding:40px;width:720px;max-width:100%;box-shadow:0 8px 32px rgba(0,0,0,.08)}
h1{font-size:24px;font-weight:700;text-align:center;margin-bottom:8px}
.subtitle{text-align:center;color:#86868b;font-size:14px;margin-bottom:24px}
.drop-zone{border:2px dashed #c7c7cc;border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:border .2s,background .2s;margin-bottom:16px}
.drop-zone.dragover{border-color:#007aff;background:#e8f0fe}
.drop-zone-icon{font-size:40px;margin-bottom:8px}
.drop-zone-text{color:#86868b;font-size:14px}
.drop-zone-text strong{color:#007aff}
#fileName{display:none;font-size:14px;color:#1d1d1f;margin-top:12px;word-break:break-all}
.file-info{background:#f5f5f7;border-radius:12px;padding:16px;margin-bottom:16px;display:none}
.file-info dl{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:13px}
.file-info dt{font-weight:600;color:#555;white-space:nowrap}
.file-info dd{color:#1d1d1f;word-break:break-all}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:6px}
.form-group input[type="text"],.form-group input[type="password"]{width:100%;padding:10px 12px;border:1px solid #c7c7cc;border-radius:8px;font-size:14px;outline:none;transition:border .2s}
.form-group input:focus{border-color:#007aff}
.checkbox-group{display:flex;align-items:center;gap:6px;margin-bottom:16px}
.checkbox-group label{font-size:13px;color:#555;cursor:pointer}
.btn{display:block;width:100%;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;transition:opacity .2s}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#007aff;color:#fff}
.btn-primary:hover:not(:disabled){opacity:.85}
.btn-success{background:#34c759;color:#fff}
.btn-success:hover:not(:disabled){opacity:.85}
.btn-secondary{background:#e8e8ed;color:#1d1d1f;margin-top:10px}
.btn-secondary:hover{opacity:.8}
#spinner{display:none;text-align:center;padding:20px;color:#86868b;font-size:14px}
#spinner::after{content:'';display:inline-block;width:20px;height:20px;border:2px solid #c7c7cc;border-top-color:#007aff;border-radius:50%;animation:spin .6s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.error{background:#ffe5e5;border-radius:8px;padding:10px 14px;font-size:13px;color:#c41e3a;margin-bottom:12px}
.result-section{display:none;margin-top:16px}
.btn-group{display:flex;flex-direction:column;gap:8px}
.footer-note{font-size:11px;color:#aeaeb2;text-align:center;margin-top:16px;margin-bottom:8px}
.hidden{display:none}
</style>
</head>
<body>
<div class="container">
<h1>QMC Decoder</h1>
<p class="subtitle">解密 .qmc0 .qmc3 .qmcflac .mgg .mflac 等文件</p>

<div id="dropZone" class="drop-zone">
<div class="drop-zone-icon">📂</div>
<div class="drop-zone-text">拖拽文件到此处，或 <strong>点击选择文件</strong></div>
<div id="fileName"></div>
</div>
<input type="file" id="fileInput" accept=".qmc0,.qmc2,.qmc3,.qmcflac,.qmcogg,.mgg,.mgg0,.mgg1,.mggl,.mflac,.mflac0,.mflach" style="display:none">

<div id="fileInfo" class="file-info"></div>

<div id="ekeyRow" class="hidden">
<div class="form-group">
<label for="ekey">加密密钥 (ekey)</label>
<input type="password" id="ekey" placeholder="输入 ekey（Base64 字符串）">
</div>
<div class="checkbox-group">
<input type="checkbox" id="showEkey">
<label for="showEkey">显示密钥</label>
</div>
</div>

<div id="spinner"></div>
<div id="errorMsg"></div>

<div id="resultSection" class="result-section">
<div class="file-info" id="resultInfo"></div>
<div class="btn-group">
<button id="downloadBtn" class="btn btn-success">⬇ 下载解密文件</button>
<button id="resetBtn" class="btn btn-secondary">解密另一个文件</button>
</div>
<p class="footer-note">解密在浏览器本地完成，文件不会上传到服务器</p>
</div>

<div id="initialActions" class="btn-group">
<button id="detectBtn" class="btn btn-secondary">检测文件信息</button>
<button id="decryptBtn" class="btn btn-primary">🔓 开始解密</button>
</div>
</div>

<script>
// ---------------------------------------------------------------------------
// QMC1 – simple XOR cipher
// ---------------------------------------------------------------------------
const KEY_TABLE = [
  0xc3,0x4a,0xd6,0xca,0x90,0x67,0xf7,0x52,0xd8,0xa1,0x66,0x62,0x9f,0x5b,0x09,0x00,
  0xc3,0x5e,0x95,0x23,0x9f,0x13,0x11,0x7e,0xd8,0x92,0x3f,0xbc,0x90,0xbb,0x74,0x0e,
  0xc3,0x47,0x74,0x3d,0x90,0xaa,0x3f,0x51,0xd8,0xf4,0x11,0x84,0x9f,0xde,0x95,0x1d,
  0xc3,0xc6,0x09,0xd5,0x9f,0xfa,0x66,0xf9,0xd8,0xf0,0xf7,0xa0,0x90,0xa1,0xd6,0xf3,
];
function qmc1GetMask(offset) {
  let index = (offset % 0x7fff) & 0x7f;
  index = index > 0x3f ? (0x80 - index) & 0x3f : index;
  return KEY_TABLE[index];
}
function qmc1Decrypt(data) {
  for (let i = 0; i < data.length; i++) data[i] ^= qmc1GetMask(i);
}

// ---------------------------------------------------------------------------
// TC-TEA (16 rounds, big-endian CBC, salt/padding)
// ---------------------------------------------------------------------------
const TEA_DELTA = 0x9e3779b9;
const TEA_ROUNDS = 16;
const SALT_LEN = 2;
const ZERO_LEN = 7;
const FIXED_PADDING_LEN = 1 + SALT_LEN + ZERO_LEN;

function add32(a, b) { return (a + b) >>> 0; }
function sub32(a, b) { return (a - b) >>> 0; }
function mul32(a, b) { return Math.imul(a, b) >>> 0; }
function readU32BE(buf, off) { return ((buf[off] << 24) | (buf[off + 1] << 16) | (buf[off + 2] << 8) | buf[off + 3]) >>> 0; }
function writeU32BE(buf, off, v) { v >>>= 0; buf[off] = (v >>> 24) & 0xff; buf[off+1] = (v >>> 16) & 0xff; buf[off+2] = (v >>> 8) & 0xff; buf[off+3] = v & 0xff; }
function readU64BE(buf, off) { return { hi: readU32BE(buf, off), lo: readU32BE(buf, off + 4) }; }
function writeU64BE(buf, off, hi, lo) { writeU32BE(buf, off, hi); writeU32BE(buf, off + 4, lo); }
function xor64(a, b) { return { hi: (a.hi ^ b.hi) >>> 0, lo: (a.lo ^ b.lo) >>> 0 }; }
function ecbSingleRound(value, sum, k1, k2) {
  const left = add32((value << 4) >>> 0, k1);
  const right = add32(value >>> 5, k2);
  return (left ^ add32(value, sum) ^ right) >>> 0;
}
function teaDecryptBlock(v0, v1, k) {
  let y = v0 >>> 0, z = v1 >>> 0, sum = mul32(TEA_DELTA, TEA_ROUNDS);
  for (let i = 0; i < TEA_ROUNDS; i++) {
    z = sub32(z, ecbSingleRound(y, sum, k[2], k[3]));
    y = sub32(y, ecbSingleRound(z, sum, k[0], k[1]));
    sum = sub32(sum, TEA_DELTA);
  }
  return [y >>> 0, z >>> 0];
}
function teaEncryptBlock(v0, v1, k) {
  let y = v0 >>> 0, z = v1 >>> 0, sum = 0;
  for (let i = 0; i < TEA_ROUNDS; i++) {
    sum = add32(sum, TEA_DELTA);
    y = add32(y, ecbSingleRound(z, sum, k[0], k[1]));
    z = add32(z, ecbSingleRound(y, sum, k[2], k[3]));
  }
  return [y >>> 0, z >>> 0];
}
function parseTeaKey(key) {
  if (key.length < 16) return null;
  return [readU32BE(key, 0), readU32BE(key, 4), readU32BE(key, 8), readU32BE(key, 12)];
}
function teaDecrypt(ciphertext, key) {
  const k = parseTeaKey(key);
  if (!k) return null;
  const inputLen = ciphertext.length;
  if (inputLen < FIXED_PADDING_LEN || inputLen % 8 !== 0) return null;
  const plain = new Uint8Array(inputLen);
  let iv1 = { hi: 0, lo: 0 }, iv2 = { hi: 0, lo: 0 };
  for (let i = 0; i < inputLen; i += 8) {
    const cb = readU64BE(ciphertext, i);
    const r = xor64(cb, iv2);
    const db = teaDecryptBlock(r.hi, r.lo, k);
    const pb = xor64({ hi: db[0], lo: db[1] }, iv1);
    writeU64BE(plain, i, pb.hi, pb.lo);
    iv1 = cb;
    iv2 = { hi: db[0], lo: db[1] };
  }
  const padSize = plain[0] & 0b111;
  const startLoc = 1 + padSize + SALT_LEN;
  const endLoc = inputLen - ZERO_LEN;
  for (let i = endLoc; i < inputLen; i++) { if (plain[i] !== 0) return null; }
  return plain.slice(startLoc, endLoc);
}
function teaEncrypt(plaintext, key) {
  const k = parseTeaKey(key);
  if (!k) return null;
  const salt = new Uint8Array([0xA5, 0x6E, 0x35, 0xBC, 0x7C, 0x31, 0x04, 0x55, 0xA0, 0xBF]);
  const len = FIXED_PADDING_LEN + plaintext.length;
  const padLen = (8 - (len & 0b111)) & 0b111;
  const expectedOutputLen = len + padLen;
  const cipher = new Uint8Array(expectedOutputLen);
  const headerLen = 1 + padLen + SALT_LEN;
  const header = new Uint8Array(16);
  for (let i = 0; i < headerLen && i < salt.length; i++) header[i] = salt[i];
  const copyToHeaderLen = Math.min(16 - headerLen, plaintext.length);
  for (let i = 0; i < copyToHeaderLen; i++) header[headerLen + i] = plaintext[i];
  const remainingPlain = plaintext.slice(copyToHeaderLen);
  header[0] = (header[0] & ~7) | (padLen & 7);
  let iv1 = { hi: 0, lo: 0 }, iv2 = { hi: 0, lo: 0 }, offset = 0;
  function processBlock(data) {
    const pb = readU64BE(data, 0);
    const iv2Next = xor64(pb, iv1);
    const enc = teaEncryptBlock(iv2Next.hi, iv2Next.lo, k);
    const cb = xor64({ hi: enc[0], lo: enc[1] }, iv2);
    writeU64BE(cipher, offset, cb.hi, cb.lo);
    offset += 8;
    iv1 = cb;
    iv2 = iv2Next;
  }
  processBlock(header.subarray(0, 8));
  processBlock(header.subarray(8));
  const wholeBlocks = remainingPlain.length - (remainingPlain.length % 8);
  for (let i = 0; i < wholeBlocks; i += 8) processBlock(remainingPlain.subarray(i, i + 8));
  if (remainingPlain.length % 8 !== 0) {
    const last = new Uint8Array(8);
    last.set(remainingPlain.subarray(wholeBlocks));
    processBlock(last);
  }
  return cipher;
}

// ---------------------------------------------------------------------------
// QMC2 – Map / RC4 cipher + ekey parsing
// ---------------------------------------------------------------------------
const QMC2_ENCV2_PREFIX = 'QQMusic EncV2,Key:';
const QMC2_ENCV2_STAGE1_KEY = new TextEncoder().encode('386ZJY!@#*$%^&)(');
const QMC2_ENCV2_STAGE2_KEY = new TextEncoder().encode('**#!(#$%&^a1cZ,T');
const FIRST_SEGMENT_SIZE = 0x80;
const OTHER_SEGMENT_SIZE = 0x1400;

function simpleMakeKey(seed, size) {
  const r = new Uint8Array(size);
  for (let i = 0; i < size; i++) r[i] = Math.floor(Math.abs(100 * Math.tan(seed + i * 0.1))) & 0xff;
  return r;
}
function deriveTeaKey(ekeyHeader) {
  const sk = simpleMakeKey(106, 8);
  const tk = new Uint8Array(16);
  for (let i = 0; i < 16; i += 2) { tk[i] = sk[i / 2]; tk[i + 1] = ekeyHeader[i / 2]; }
  return tk;
}
function b64decode(s) { return Uint8Array.from(atob(s.replace(/\0/g, '')), c => c.charCodeAt(0)); }
function b64encode(buf) {
  let s = '';
  for (let i = 0; i < buf.length; i++) s += String.fromCharCode(buf[i]);
  return btoa(s);
}
function concatU8(a, b) { const r = new Uint8Array(a.length + b.length); r.set(a); r.set(b, a.length); return r; }
function u8Equals(a, b) { if (a.length !== b.length) return false; for (let i = 0; i < a.length; i++) if (a[i] !== b[i]) return false; return true; }
function u8IndexOf(a, val) { for (let i = 0; i < a.length; i++) if (a[i] === val) return i; return -1; }

function parseEkey(ekey) {
  const ekeyDecoded = b64decode(ekey);
  if (ekeyDecoded.length === 0) throw new Error('Key too short');
  let encV1Key = ekeyDecoded;
  const prefix = new TextEncoder().encode(QMC2_ENCV2_PREFIX);
  if (ekeyDecoded.length >= prefix.length && u8Equals(ekeyDecoded.subarray(0, prefix.length), prefix)) {
    const encV2Blob = ekeyDecoded.subarray(prefix.length);
    const stage1 = teaDecrypt(encV2Blob, QMC2_ENCV2_STAGE1_KEY);
    if (!stage1) throw new Error('EncV2 stage 1 failed');
    const stage2 = teaDecrypt(stage1, QMC2_ENCV2_STAGE2_KEY);
    if (!stage2) throw new Error('EncV2 stage 2 failed');
    encV1Key = b64decode(new TextDecoder().decode(stage2));
  }
  if (encV1Key.length < 8) throw new Error('Key too short');
  const header = encV1Key.subarray(0, 8);
  const body = encV1Key.subarray(8);
  if (body.length === 0) return new Uint8Array(header);
  const teaKey = deriveTeaKey(header);
  const decryptedBody = teaDecrypt(body, teaKey);
  if (decryptedBody) return concatU8(header, decryptedBody);
  return new Uint8Array(encV1Key);
}

// --- QMC2 Map cipher ---
function scrambleByIndex(value, index) {
  const rotation = ((index + 4) & 0b111) >>> 0;
  return ((value << rotation) | (value >>> rotation)) & 0xff;
}
function mapL(key, offset) {
  let off = offset;
  if (off > 0x7fff) off %= 0x7fff;
  const idx = (off * off + 71214) % key.length;
  return scrambleByIndex(key[idx], idx);
}
function qmc2MapDecrypt(key, offset, buf) {
  for (let i = 0; i < buf.length; i++) buf[i] ^= mapL(key, offset + i);
}

// --- QMC2 RC4 cipher ---
function rc4CalcHashBase(data) {
  let hash = 1;
  for (const byte of data) {
    const val = byte >>> 0;
    if (val === 0) continue;
    const next = Math.imul(hash, val) >>> 0;
    if (next === 0 || next <= hash) break;
    hash = next;
  }
  return hash >>> 0;
}
function rc4InitSBox(key) {
  const n = key.length;
  let s;
  if (n > 256) { s = Array.from({ length: 256 }, (_, i) => i); for (let i = 0; i < n - 256; i++) s.push(i % 256); }
  else { s = Array.from({ length: n }, (_, i) => i); }
  let j = 0;
  for (let i = 0; i < n; i++) { j = (j + s[i] + key[i]) % n; [s[i], s[j]] = [s[j], s[i]]; }
  return s;
}
function rc4CalcSegmentKey(hash, id, seed) {
  const divisor = (id + 1) * seed;
  if (divisor === 0) return 0;
  const key = hash / divisor * 100.0;
  return isFinite(key) ? Math.floor(key) : 0;
}
function rc4Derive(n, s, j, k) {
  j.val = (j.val + 1) % n;
  k.val = (s[j.val] + k.val) % n;
  [s[j.val], s[k.val]] = [s[k.val], s[j.val]];
  return s[(s[j.val] + s[k.val]) % n];
}
function rc4EncodeFirstSegment(rc4Key, hash, offset, buf) {
  const n = rc4Key.length;
  for (let i = 0; i < buf.length; i++) {
    buf[i] ^= rc4Key[rc4CalcSegmentKey(hash, offset + i, rc4Key[(offset + i) % n]) % n];
  }
}
function rc4EncodeOtherSegment(rc4Key, hash, sBox, offset, buf) {
  const segId = Math.floor(offset / OTHER_SEGMENT_SIZE);
  let discardCount = rc4CalcSegmentKey(hash, segId, rc4Key[segId & 0x1ff]) & 0x1ff;
  discardCount += offset % OTHER_SEGMENT_SIZE;
  const n = rc4Key.length;
  const s = sBox.slice();
  const j = { val: 0 }, k = { val: 0 };
  for (let i = 0; i < discardCount; i++) rc4Derive(n, s, j, k);
  for (let i = 0; i < buf.length; i++) buf[i] ^= rc4Derive(n, s, j, k);
}
function qmc2Rc4Decrypt(rc4Key, hash, sBox, offset, buf) {
  let off = offset, remaining = buf.length, pos = 0;
  if (off < FIRST_SEGMENT_SIZE) {
    const len = Math.min(remaining, FIRST_SEGMENT_SIZE - off);
    rc4EncodeFirstSegment(rc4Key, hash, off, buf.subarray(pos, pos + len));
    pos += len; remaining -= len; off += len;
  }
  const toAlign = off % OTHER_SEGMENT_SIZE;
  if (toAlign !== 0) {
    const len = Math.min(remaining, OTHER_SEGMENT_SIZE - toAlign);
    rc4EncodeOtherSegment(rc4Key, hash, sBox, off, buf.subarray(pos, pos + len));
    pos += len; remaining -= len; off += len;
  }
  while (remaining > OTHER_SEGMENT_SIZE) {
    rc4EncodeOtherSegment(rc4Key, hash, sBox, off, buf.subarray(pos, pos + OTHER_SEGMENT_SIZE));
    pos += OTHER_SEGMENT_SIZE; remaining -= OTHER_SEGMENT_SIZE; off += OTHER_SEGMENT_SIZE;
  }
  if (remaining > 0) rc4EncodeOtherSegment(rc4Key, hash, sBox, off, buf.subarray(pos, pos + remaining));
}

// ---------------------------------------------------------------------------
// Footer detection
// ---------------------------------------------------------------------------
function readU16LE(buf, off) { return buf[off] | (buf[off + 1] << 8); }
function readU32LE(buf, off) { return buf[off] | (buf[off + 1] << 8) | (buf[off + 2] << 16) | (buf[off + 3] << 24); }
function readU32BE(buf, off) { return ((buf[off] << 24) | (buf[off + 1] << 16) | (buf[off + 2] << 8) | buf[off + 3]) >>> 0; }
function readUtf16LeString(data, offset, maxLen) {
  let r = '';
  const end = Math.min(offset + maxLen, data.length);
  for (let i = offset; i + 1 < end; i += 2) { const c = readU16LE(data, i); if (c === 0) break; r += String.fromCharCode(c); }
  return r;
}
function detectFooter(data) {
  if (data.length < 8) return { type: 'Unknown' };
  const last4 = readU32LE(data, data.length - 4);
  if (data.length >= 16) {
    const m = data.subarray(data.length - 8);
    if (m[0]===0x6d && m[1]===0x75 && m[2]===0x73 && m[3]===0x69 && m[4]===0x63 && m[5]===0x65 && m[6]===0x78 && m[7]===0x00) {
      const version = readU32LE(data, data.length - 12);
      const footerSize = readU32LE(data, data.length - 16);
      const metaSize = footerSize - 16;
      if (version === 1 && metaSize > 0 && metaSize <= data.length - 16) {
        const fs = data.length - footerSize;
        const songId = readU32LE(data, fs);
        const mid = readUtf16LeString(data, fs + 0x0c, 60);
        const filename = readUtf16LeString(data, fs + 0x48, 68);
        return { type: 'Musicex', songId, mid, filename };
      }
    }
  }
  if (last4 === 0x67615451) {
    if (data.length >= 12) {
      const metaSizeBE = readU32BE(data, data.length - 8);
      const metaEnd = data.length - 8;
      const metaStart = Math.max(0, metaEnd - metaSizeBE);
      const meta = data.subarray(metaStart, metaEnd);
      const commaPos = u8IndexOf(meta, 44);
      if (commaPos !== -1) {
        const ekey = new TextDecoder().decode(meta.subarray(0, commaPos));
        const rest = meta.subarray(commaPos + 1);
        const comma2Pos = u8IndexOf(rest, 44);
        if (comma2Pos !== -1) {
          const songId = new TextDecoder().decode(rest.subarray(0, comma2Pos));
          return { type: 'QTag', ekey, songId };
        }
      }
    }
  }
  if (last4 > 0 && last4 <= 0x400) return { type: 'V1', keySize: last4 };
  return { type: 'Unknown' };
}

// ---------------------------------------------------------------------------
// Format map
// ---------------------------------------------------------------------------
const FORMATS = {
  qmc0:{type:'qmc1',ext:'mp3'}, qmc2:{type:'qmc1',ext:'ogg'}, qmc3:{type:'qmc1',ext:'mp3'},
  qmcflac:{type:'qmc1',ext:'flac'}, qmcogg:{type:'qmc1',ext:'ogg'},
  mgg:{type:'qmc2',ext:'ogg'}, mgg0:{type:'qmc2',ext:'ogg'}, mgg1:{type:'qmc2',ext:'ogg'},
  mggl:{type:'qmc2',ext:'ogg'},
  mflac:{type:'qmc2',ext:'flac'}, mflac0:{type:'qmc2',ext:'flac'}, mflach:{type:'qmc2',ext:'flac'},
};
function getFormatInfo(ext) { return FORMATS[ext.toLowerCase()] || null; }
function getExt(filename) { const i = filename.lastIndexOf('.'); return i >= 0 ? filename.slice(i + 1) : ''; }
function getBaseName(filename) { const i = filename.lastIndexOf('.'); return i >= 0 ? filename.slice(0, i) : filename; }

// ---------------------------------------------------------------------------
// Resolve ekey from footer
// ---------------------------------------------------------------------------
function resolveEkey(data, footer, userEkey) {
  switch (footer.type) {
    case 'QTag': {
      const metaSizeBE = readU32BE(data, data.length - 8);
      return { ekeyStr: footer.ekey, audioLen: data.length - 8 - metaSizeBE };
    }
    case 'V1': {
      const keyStart = data.length - 4 - footer.keySize;
      const keyBytes = data.subarray(keyStart, data.length - 4);
      return { ekeyStr: b64encode(keyBytes), audioLen: keyStart };
    }
    case 'Musicex': {
      let audioLen = data.length;
      if (data.length >= 16) {
        const m = data.subarray(data.length - 8);
        if (m[0]===0x6d && m[1]===0x75 && m[2]===0x73 && m[3]===0x69 && m[4]===0x63 && m[5]===0x65 && m[6]===0x78 && m[7]===0x00) {
          audioLen = data.length - readU32LE(data, data.length - 16);
        }
      }
      if (userEkey) return { ekeyStr: userEkey, audioLen };
      throw new Error(`此文件使用 musicex 格式（songId=${footer.songId}），未嵌入 ekey，请手动输入。`);
    }
    default:
      if (userEkey) return { ekeyStr: userEkey, audioLen: data.length };
      throw new Error('无法检测文件尾部格式，也未提供 ekey。');
  }
}

// ---------------------------------------------------------------------------
// Main decrypt
// ---------------------------------------------------------------------------
function decryptFile(data, ext, ekey) {
  const fmt = getFormatInfo(ext);
  if (!fmt) throw new Error(`不支持的格式: ${ext}`);
  const footer = detectFooter(data);
  if (fmt.type === 'qmc1') {
    let decryptedLen = data.length;
    if (footer.type === 'V1') decryptedLen = data.length - 4 - footer.keySize;
    const encrypted = data.subarray(0, decryptedLen);
    const decrypted = new Uint8Array(encrypted);
    qmc1Decrypt(decrypted);
    return { data: decrypted, footer, ext: fmt.ext, format: fmt };
  }
  if (fmt.type === 'qmc2') {
    const { ekeyStr, audioLen } = resolveEkey(data, footer, ekey);
    const encrypted = data.subarray(0, audioLen);
    const decrypted = new Uint8Array(encrypted);
    const qmc2Key = parseEkey(ekeyStr);
    if (qmc2Key.length > 300) {
      const hash = rc4CalcHashBase(qmc2Key);
      const sBox = rc4InitSBox(qmc2Key);
      qmc2Rc4Decrypt(qmc2Key, hash, sBox, 0, decrypted);
    } else {
      qmc2MapDecrypt(qmc2Key, 0, decrypted);
    }
    return { data: decrypted, footer, ext: fmt.ext, format: fmt };
  }
  throw new Error('未知格式类型');
}

// ---------------------------------------------------------------------------
// UI logic
// ---------------------------------------------------------------------------
let currentFileData = null;
let currentFileName = '';
let currentDecryptedData = null;
let currentOutputExt = '';

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileNameEl = document.getElementById('fileName');
const fileInfo = document.getElementById('fileInfo');
const ekeyRow = document.getElementById('ekeyRow');
const ekeyInput = document.getElementById('ekey');
const showEkey = document.getElementById('showEkey');
const errorMsg = document.getElementById('errorMsg');
const spinner = document.getElementById('spinner');
const resultSection = document.getElementById('resultSection');
const resultInfo = document.getElementById('resultInfo');
const downloadBtn = document.getElementById('downloadBtn');
const resetBtn = document.getElementById('resetBtn');
const initialActions = document.getElementById('initialActions');
const detectBtn = document.getElementById('detectBtn');
const decryptBtn = document.getElementById('decryptBtn');

function showError(msg) { errorMsg.innerHTML = '<div class="error">' + msg + '</div>'; }
function clearError() { errorMsg.innerHTML = ''; }
function showSpinner() { spinner.style.display = 'block'; }
function hideSpinner() { spinner.style.display = 'none'; }

function resetUI() {
  currentFileData = null;
  currentFileName = '';
  currentDecryptedData = null;
  currentOutputExt = '';
  fileInfo.style.display = 'none';
  fileInfo.innerHTML = '';
  resultSection.style.display = 'none';
  initialActions.style.display = 'block';
  ekeyRow.classList.add('hidden');
  ekeyInput.value = '';
  clearError();
  hideSpinner();
  fileInput.value = '';
  fileNameEl.style.display = 'none';
}

dropZone.addEventListener('click', () => fileInput.click());

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});

fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

showEkey.addEventListener('change', () => { ekeyInput.type = showEkey.checked ? 'text' : 'password'; });

function handleFile(file) {
  clearError();
  resetUI();
  currentFileName = file.name;
  fileNameEl.textContent = '📄 ' + file.name;
  fileNameEl.style.display = 'block';
  const reader = new FileReader();
  reader.onload = function(e) {
    currentFileData = new Uint8Array(e.target.result);
    const ext = getExt(file.name);
    const fmt = getFormatInfo(ext);
    if (!fmt) { showError('不支持的格式: .' + ext); return; }
    const footer = detectFooter(currentFileData);
    let html = '<dl>';
    html += '<dt>文件名</dt><dd>' + file.name + '</dd>';
    html += '<dt>格式</dt><dd>.' + ext + ' → .' + fmt.ext + ' (' + fmt.type.toUpperCase() + ')</dd>';
    html += '<dt>文件大小</dt><dd>' + (currentFileData.length / 1024).toFixed(1) + ' KB</dd>';
    html += '<dt>尾部类型</dt><dd>' + footer.type;
    if (footer.type === 'Musicex') html += ' <small>(songId=' + footer.songId + ', mid=' + (footer.mid || '') + ')</small>';
    else if (footer.type === 'QTag') html += ' (ekey 已嵌入)';
    else if (footer.type === 'V1') html += ' (keySize=' + footer.keySize + ')';
    else if (footer.type === 'Unknown') html += ' (未知)';
    html += '</dd></dl>';
    fileInfo.innerHTML = html;
    fileInfo.style.display = 'block';
    if (footer.type === 'Musicex') ekeyRow.classList.remove('hidden'); else ekeyRow.classList.add('hidden');
  };
  reader.readAsArrayBuffer(file);
}

detectBtn.addEventListener('click', () => {
  if (!currentFileData) { showError('请先选择文件'); return; }
  clearError();
  const ext = getExt(currentFileName);
  const fmt = getFormatInfo(ext);
  if (!fmt) { showError('不支持的格式: .' + ext); return; }
  const footer = detectFooter(currentFileData);
  let html = '<dl>';
  html += '<dt>文件名</dt><dd>' + currentFileName + '</dd>';
  html += '<dt>格式</dt><dd>.' + ext + ' → .' + fmt.ext + ' (' + fmt.type.toUpperCase() + ')</dd>';
  html += '<dt>文件大小</dt><dd>' + (currentFileData.length / 1024).toFixed(1) + ' KB</dd>';
  html += '<dt>尾部类型</dt><dd>' + footer.type;
  if (footer.type === 'Musicex') {
    html += '<br><small>songId: ' + footer.songId + '</small>';
    html += '<br><small>mid: ' + (footer.mid || '') + '</small>';
    html += '<br><small>filename: ' + (footer.filename || '') + '</small>';
  } else if (footer.type === 'QTag') html += ' (ekey 已嵌入)';
  else if (footer.type === 'V1') html += ' (keySize=' + footer.keySize + ')';
  html += '</dd></dl>';
  fileInfo.innerHTML = html;
  fileInfo.style.display = 'block';
  if (footer.type === 'Musicex') ekeyRow.classList.remove('hidden'); else ekeyRow.classList.add('hidden');
});

decryptBtn.addEventListener('click', () => {
  if (!currentFileData) { showError('请先选择文件'); return; }
  clearError();
  const ext = getExt(currentFileName);
  const fmt = getFormatInfo(ext);
  if (!fmt) { showError('不支持的格式: .' + ext); return; }
  const footer = detectFooter(currentFileData);
  if (footer.type === 'Musicex' && !ekeyInput.value.trim()) {
    showError('此文件需要手动输入 ekey');
    ekeyRow.classList.remove('hidden');
    return;
  }
  showSpinner();
  setTimeout(() => {
    try {
      const userEkey = ekeyInput.value.trim() || undefined;
      const result = decryptFile(currentFileData, ext, userEkey);
      currentDecryptedData = result.data;
      currentOutputExt = result.ext;
      const outputName = getBaseName(currentFileName) + '.' + result.ext;

      let html = '<dl>';
      html += '<dt>输入文件</dt><dd>' + currentFileName + '</dd>';
      html += '<dt>输出文件</dt><dd>' + outputName + '</dd>';
      html += '<dt>加密类型</dt><dd>.' + ext + ' → .' + result.ext + ' (' + result.format.type.toUpperCase() + ')</dd>';
      html += '<dt>文件大小</dt><dd>' + (result.data.length / 1024).toFixed(1) + ' KB</dd>';
      html += '<dt>尾部类型</dt><dd>' + result.footer.type;
      if (result.footer.type === 'Musicex') {
        html += '<br><small>songId: ' + result.footer.songId + '</small>';
        html += '<br><small>mid: ' + (result.footer.mid || '') + '</small>';
      } else if (result.footer.type === 'QTag') html += ' (ekey 已嵌入)';
      else if (result.footer.type === 'V1') html += ' (keySize=' + result.footer.keySize + ')';
      html += '</dd></dl>';
      resultInfo.innerHTML = html;

      downloadBtn.onclick = function() {
        const blob = new Blob([result.data], { type: 'application/octet-stream' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = outputName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      initialActions.style.display = 'none';
      resultSection.style.display = 'block';
      hideSpinner();
    } catch (e) {
      hideSpinner();
      showError(e.message);
    }
  }, 50);
});

resetBtn.addEventListener('click', () => {
  resetUI();
  dropZone.scrollIntoView({ behavior: 'smooth' });
});
</script>
</body>
</html>
