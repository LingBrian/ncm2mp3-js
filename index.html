<!DOCTYPE html>

            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

            border-color: #764ba2;
            background: #f0f2ff;
            transform: scale(1.02);
        }
        .drop-zone-icon { font-size: 48px; margin-bottom: 15px; }
        .drop-zone-text { color: #666; font-size: 16px; }
        .drop-zone-hint { color: #999; font-size: 12px; margin-top: 10px; }
        #fileInput { display: none; }
        .file-list { margin-top: 20px; max-height: 300px; overflow-y: auto; }
        .file-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: #f5f5f5;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: all 0.3s ease;

            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;

        .file-status { font-size: 12px; color: #666; margin-top: 3px; }

            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;

        .btn-remove { background: #dc3545; color: white; }
        .btn-remove:hover { background: #c82333; }
        .progress-bar {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        .actions { display: flex; gap: 10px; margin-top: 20px; justify-content: center; flex-wrap: wrap; }

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            font-size: 16px;

        .btn-secondary { background: #6c757d; color: white; padding: 12px 30px; font-size: 16px; }
        .btn-secondary:disabled { opacity: 0.6; cursor: not-allowed; }

            gap: 30px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;

        .stat-label { font-size: 12px; color: #999; margin-top: 5px; }

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

        if (onProgress) onProgress(0.5);
        const audioData = data.slice(offset);
        const cr4 = new CR4();
        cr4.KSA(audioKey);
        const decryptedAudio = cr4.PRGA(new Uint8Array(audioData), audioData.length);
        if (onProgress) onProgress(0.9);
        const format = detectAudioFormat(decryptedAudio);
        let songName = 'Unknown', artist = 'Unknown', album = 'Unknown';
        if (metadata) {
            if (metadata.musicName) songName = metadata.musicName;
            if (metadata.artist && metadata.artist.length > 0) artist = metadata.artist.map(a => a[0]).join(', ');
            if (metadata.album) album = metadata.album;
        }
        return { audioData: decryptedAudio, format: format, metadata: metadata, image: coverImage, imageMime: coverImage ? (coverImage[0] === 0xFF && coverImage[1] === 0xD8 ? 'image/jpeg' : 'image/png') : null, songName: songName, artist: artist, album: album };
    }
    return { parse: parseNCM, detectFormat: detectAudioFormat };
})();

const ID3Writer = (function() {
    function encodeSize(size) { const bytes = new Uint8Array(4); bytes[0] = (size >> 21) & 0x7F; bytes[1] = (size >> 14) & 0x7F; bytes[2] = (size >> 7) & 0x7F; bytes[3] = size & 0x7F; return bytes; }
    function stringToBytes(str, encoding) {
        if (encoding === 0x01) {
            const utf16 = []; utf16.push(0xFE, 0xFF);
            for (let i = 0; i < str.length; i++) { const code = str.charCodeAt(i); utf16.push((code >> 8) & 0xFF); utf16.push(code & 0xFF); }
            return new Uint8Array(utf16);
        } else { return new TextEncoder().encode(str); }
    }
    function createTextFrame(identifier, text) {
        const textBytes = stringToBytes(text, 0x01);
        const frameData = new Uint8Array(1 + textBytes.length); frameData[0] = 0x01; frameData.set(textBytes, 1);
        const frame = new Uint8Array(10 + frameData.length);
        const idBytes = new TextEncoder().encode(identifier); frame.set(idBytes, 0);
        const sizeBytes = new Uint8Array(4); sizeBytes[0] = (frameData.length >> 24) & 0xFF; sizeBytes[1] = (frameData.length >> 16) & 0xFF; sizeBytes[2] = (frameData.length >> 8) & 0xFF; sizeBytes[3] = frameData.length & 0xFF;
        frame.set(sizeBytes, 4); frame.set(frameData, 10);
        return frame;
    }
    function createAPICFrame(imageBuffer, mimeType, pictureType, description) {
        mimeType = mimeType || 'image/jpeg'; pictureType = pictureType || 0x03; description = description || '';
        const mimeBytes = new TextEncoder().encode(mimeType);
        const descBytes = stringToBytes(description, 0x00);
        const frameData = new Uint8Array(1 + mimeBytes.length + 1 + 1 + descBytes.length + imageBuffer.length);
        let offset = 0;
        frameData[offset++] = 0x00;
        frameData.set(mimeBytes, offset); offset += mimeBytes.length;
        frameData[offset++] = 0x00;
        frameData[offset++] = pictureType;
        frameData.set(descBytes, offset); offset += descBytes.length;
        frameData.set(imageBuffer, offset);
        const frame = new Uint8Array(10 + frameData.length);
        const idBytes = new TextEncoder().encode('APIC'); frame.set(idBytes, 0);
        const sizeBytes = new Uint8Array(4); sizeBytes[0] = (frameData.length >> 24) & 0xFF; sizeBytes[1] = (frameData.length >> 16) & 0xFF; sizeBytes[2] = (frameData.length >> 8) & 0xFF; sizeBytes[3] = frameData.length & 0xFF;
        frame.set(sizeBytes, 4); frame.set(frameData, 10);
        return frame;
    }
    function getMimeType(buffer) {
        if (buffer.length > 3 && buffer[0] === 0xFF && buffer[1] === 0xD8 && buffer[2] === 0xFF) return 'image/jpeg';
        if (buffer.length > 8 && buffer[0] === 0x89 && buffer[1] === 0x50 && buffer[2] === 0x4E && buffer[3] === 0x47) return 'image/png';
        return 'image/jpeg';
    }
    function write(tags, audioData) {
        const frames = [];
        if (tags.title) frames.push(createTextFrame('TIT2', tags.title));
        if (tags.artist) frames.push(createTextFrame('TPE1', tags.artist));
        if (tags.album) frames.push(createTextFrame('TALB', tags.album));
        if (tags.year) frames.push(createTextFrame('TYER', tags.year.toString()));
        if (tags.genre) frames.push(createTextFrame('TCON', tags.genre));
        if (tags.image && tags.image.imageBuffer) {
            const mimeType = tags.image.mime || getMimeType(tags.image.imageBuffer);
            const pictureType = tags.image.type && tags.image.type.id !== undefined ? tags.image.type.id : 0x03;
            const description = tags.image.description || '';
            frames.push(createAPICFrame(tags.image.imageBuffer, mimeType, pictureType, description));
        }
        const framesData = new Uint8Array(frames.reduce((sum, f) => sum + f.length, 0));
        let offset = 0;
        for (const frame of frames) { framesData.set(frame, offset); offset += frame.length; }
        const header = new Uint8Array(10);
        header[0] = 0x49; header[1] = 0x44; header[2] = 0x33;
        header[3] = 0x03; header[4] = 0x00; header[5] = 0x00;
        header.set(encodeSize(framesData.length), 6);
        const result = new Uint8Array(10 + framesData.length + audioData.length);
        result.set(header, 0); result.set(framesData, 10); result.set(audioData, 10 + framesData.length);
        return result;
    }
    return { write: write };
})();

(function() {
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const convertBtn = document.getElementById('convertBtn');
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    const clearBtn = document.getElementById('clearBtn');
    const totalCount = document.getElementById('totalCount');
    const successCount = document.getElementById('successCount');
    const failCount = document.getElementById('failCount');
    
    let files = [];
    let stats = { total: 0, success: 0, fail: 0 };
    
    function updateStats() {
        totalCount.textContent = stats.total;
        successCount.textContent = stats.success;
        failCount.textContent = stats.fail;
    }
    
    function updateButtons() {
        convertBtn.disabled = files.length === 0;
        clearBtn.disabled = files.length === 0;
        downloadAllBtn.disabled = stats.success === 0;
    }
    
    function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }
    
    function sanitizeFileName(name) {
        return name.replace(/[<>:"/\\|?*]/g, '_');
    }
    
    function addFiles(fileArray) {
        for (const file of fileArray) {
            if (file.name.toLowerCase().endsWith('.ncm')) {
                const id = Date.now() + Math.random();
                files.push({
                    id: id,
                    file: file,
                    status: 'pending',
                    result: null,
                    error: null
                });
                stats.total++;
                renderFileItem({
                    id: id,
                    name: file.name,
                    size: file.size,
                    status: 'pending'
                });
            }
        }
        updateStats();
        updateButtons();
    }
    
    function renderFileItem(item) {
        const div = document.createElement('div');
        div.className = 'file-item';
        div.id = 'file-' + item.id;
        div.innerHTML = `
            <div class="file-icon">🎵</div>
            <div class="file-info">
                <div class="file-name" title="${item.name}">${item.name}</div>
                <div class="file-status">${formatFileSize(item.size)} - 等待转换</div>
                <div class="progress-bar" style="display: none;">
                    <div class="progress-fill" style="width: 0%"></div>
                </div>
            </div>
            <div class="file-actions">
                <button class="btn btn-download" style="display: none;">下载</button>
                <button class="btn btn-remove">删除</button>
            </div>
        `;
        div.querySelector('.btn-remove').addEventListener('click', () => { removeFile(item.id); });
        fileList.appendChild(div);
    }
    
    function updateFileItem(id, updates) {
        const div = document.getElementById('file-' + id);
        if (!div) return;
        const statusEl = div.querySelector('.file-status');
        const progressBar = div.querySelector('.progress-bar');
        const progressFill = div.querySelector('.progress-fill');
        const downloadBtn = div.querySelector('.btn-download');
        if (updates.status === 'processing') {
            div.className = 'file-item processing';
            statusEl.textContent = '正在转换...';
            progressBar.style.display = 'block';
            if (updates.progress !== undefined) progressFill.style.width = (updates.progress * 100) + '%';
        } else if (updates.status === 'success') {
            div.className = 'file-item success';
            statusEl.textContent = `转换成功 - ${updates.format.toUpperCase()} (${formatFileSize(updates.size)})`;
            progressBar.style.display = 'none';
            downloadBtn.style.display = 'block';
            downloadBtn.onclick = () => downloadFile(id);
        } else if (updates.status === 'error') {
            div.className = 'file-item error';
            statusEl.textContent = '转换失败: ' + updates.error;
            progressBar.style.display = 'none';
        }
    }
    
    function removeFile(id) {
        const index = files.findIndex(f => f.id === id);
        if (index !== -1) {
            const file = files[index];
            if (file.status === 'success') stats.success--;
            else if (file.status === 'error') stats.fail--;
            else stats.total--;
            files.splice(index, 1);
        }
        const div = document.getElementById('file-' + id);
        if (div) div.remove();
        updateStats();
        updateButtons();
    }
    
    function downloadFile(id) {
        const file = files.find(f => f.id === id);
        if (!file || !file.result) return;
        const blob = new Blob([file.result.audioData], { type: file.result.format.mime });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const songName = sanitizeFileName(file.result.songName);
        const artist = sanitizeFileName(file.result.artist);
        a.download = `${artist} - ${songName}.${file.result.format.ext}`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
    }
    
    async function downloadAll() {
        const successFiles = files.filter(f => f.status === 'success' && f.result);
        if (successFiles.length === 0) return;
        downloadAllBtn.disabled = true;
        downloadAllBtn.textContent = '打包中...';
        try {
            const zip = new JSZip();
            for (const fileObj of successFiles) {
                const songName = sanitizeFileName(fileObj.result.songName);
                const artist = sanitizeFileName(fileObj.result.artist);
                const fileName = `${artist} - ${songName}.${fileObj.result.format.ext}`;
                zip.file(fileName, fileObj.result.audioData);
            }
            const content = await zip.generateAsync({ type: 'blob' });
            const url = URL.createObjectURL(content);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ncm_converted_${Date.now()}.zip`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        } catch (error) {
            console.error('打包下载失败:', error);
            alert('打包下载失败: ' + error.message);
        } finally {
            downloadAllBtn.disabled = false;
            downloadAllBtn.textContent = '打包下载';
        }
    }
    
    async function convertFile(fileObj) {
        updateFileItem(fileObj.id, { status: 'processing', progress: 0 });
        try {
            const arrayBuffer = await fileObj.file.arrayBuffer();
            const result = await NCMDecrypt.parse(arrayBuffer, (progress) => { updateFileItem(fileObj.id, { status: 'processing', progress: progress }); });
            const tags = { title: result.songName, artist: result.artist, album: result.album };
            if (result.image) {
                tags.image = { imageBuffer: result.image, mime: result.imageMime || 'image/jpeg', type: { id: 3, name: 'Front Cover' }, description: '' };
            }
            const audioWithTags = ID3Writer.write(tags, result.audioData);
            result.audioData = audioWithTags;
            fileObj.status = 'success';
            fileObj.result = result;
            stats.success++;
            updateFileItem(fileObj.id, { status: 'success', format: result.format.ext, size: result.audioData.length });
            return true;
        } catch (error) {
            console.error('转换失败:', error);
            fileObj.status = 'error';
            fileObj.error = error.message;
            stats.fail++;
            updateFileItem(fileObj.id, { status: 'error', error: error.message });
            return false;
        }
    }
    
    async function convertAll() {
        convertBtn.disabled = true;
        for (const fileObj of files) {
            if (fileObj.status === 'pending') { await convertFile(fileObj); updateStats(); }
        }
        updateButtons();
    }
    
    function clearAll() {
        files = []; fileList.innerHTML = ''; stats = { total: 0, success: 0, fail: 0 };
        updateStats(); updateButtons();
    }
    
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
    dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); addFiles(e.dataTransfer.files); });
    fileInput.addEventListener('change', (e) => { addFiles(e.target.files); fileInput.value = ''; });
    convertBtn.addEventListener('click', convertAll);
    downloadAllBtn.addEventListener('click', downloadAll);
    clearBtn.addEventListener('click', clearAll);
})();
</script>
</body>
</html>
